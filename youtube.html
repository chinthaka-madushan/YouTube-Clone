<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youTube Clone</title>
    <link rel="stylesheet" href="styles/video.css">
    <link rel="stylesheet" href="styles/sidebar.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/genaral.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="header">
        <div class="left-section">
            <img class="menu-icon" src="icon/menu.png" alt="">
            <img class="youtube-logo" src="icon/youtube-logo.png" alt="YouTube Logo">
        </div>
        <div class="middle-section">
            <div class="search-container">
                <input class="search-bar" type="text" placeholder="Search">
                <button class="search-button">
                    <img class="search-icon" src="icon/search.png" alt="">
                </button>
            </div>
            <div class="voice-search">
                <img class="voice-icon" src="icon/mic.png" alt="">
            </div>
        </div>
        <div class="right-section">
            <button class="create-button">
                <img class="create-icon" src="icon/add.png" alt="">
                <p class="create-txt">Create</p>
            </button>
            <div class="notification">
                <img class="notification-icon" src="icon/notifications.png" alt="">
            </div>

            <img class="profile-pic" src="thumbnail/profile-pic.jpg" alt="">

        </div>
    </div>
    <div class="side-bar">
        <div class="sidebar-item">
            <img class="home-icon" src="icon/home.png" alt="">
            <p class="item-txt">Home</p>
        </div>
        <div class="sidebar-item">
            <img class="shorts-icon" src="icon/shorts.png" alt="">
            <p class="item-txt">Shorts</p>
        </div>
        <div class="sidebar-item">
            <img class="subscriptions-icon" src="icon/subscriptions.png" alt="">
            <p class="item-txt">Subscriptions</p>
        </div>
        <div class="sidebar-item">
            <img class="you-icon" src="icon/you.png" alt="">
            <p class="item-txt">You</p>
        </div>
    </div>
    <div class="main-content">
        <div class="video-card">
        </div>
        <div class="video-card"></div>
        <div class="video-card"></div>
        <div class="video-card"></div>
        <div class="video-card"></div>

        <div class="video-card"></div>
        <div class="video-card"></div>
        <div class="video-card"></div>
        <div class="video-card"></div>
        <div class="video-card"></div>
    </div>
</body>

</html>
